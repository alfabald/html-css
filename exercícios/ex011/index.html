<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mídias em HTML</title>
</head>
<body>
    <h1>Imagem dinâmica</h1>
    <p>Tente abrir o site em varios dispositivos diferentes ou simplesmente aumente e diminua o tamanho do seu navegador.</p>
    <picture>
        <source media="(max-width:750px)" srcset="imagens/foto-p.png" type="image/png">
        <source media="(max-width:1050px)" srcset="imagens/foto-m.png" type="image/png">
        <img src="imagens/foto-g.png" alt="Imagem flexível">
    </picture>
    <h1>Reproduzindo Áudio</h1>
    <p>Vamos aprender a reproduzir em HTML5</p>
    <audio src="midia/happy-mistake.mp3" controls autoplay loop></audio>
    <audio preload="metadata" controls autoplay loop>
        <source src="midia/AUD-20210807-WA0050.mp3" type="audio/mpeg">
        <source src="midia/AUD-20210807-WA0050.mp3" type="audio/ogg">
        <source src="midia/AUD-20210807-WA0050.mp3" type="audio/wav">
        <p>infelizmente seu navegador não consegue reproduzir áudio. <a href="midia/AUD-20210807-WA0050.mp3">Cliqui aqui para baixar o arquivo MP3</a></p>
    </audio>
    
</html>
