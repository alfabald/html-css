<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício de Tabelas</title>
       <style>
        body {
            font-family: Arial, Arial, Helvetica, sans-serif;
        }

        table {
            border-collapse: collapse;
            width: 100%;
        }

        caption {
            font-size: 1.5em;
            margin: 10px 0;
            font-weight: bold;
            padding: 10px;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 8px;
          
      
        }
        .cnome {
            background-color: aqua;
            width: 30%;
        }
    </style>
</head>
<body>
    <h1>Exercício de Tabelas</h1>
    <table>
        <colgroup>
        <col class="cnome">
        <col class="csexo">
        <col class="cidade">
        <col class="cprof"> 
    </colgroup>
        <caption>Cadastro</caption>
        <tr>
            <th scope="col">Nome</th>
            <th scope="col">Sexo</th>
            <th scope="col">Idade</th>
            <th scope="col">Profissão</th>
        </tr>
        <tr>
            <td>Maria Clara</td>
            <td>F</td>
            <td>25</td>
            <td>Engenheira</td>
        </tr>

        <tr>
            <td>João Silva</td>
            <td>M</td>
            <td>30</td>
            <td>Professor</td>
        </tr>
        <tr>
            <td class="destaque">Ana Maria Santos</td>
            <td>F</td>
            <td>28</td>
            <td>Médica</td>
        </tr>
        <tr>
            <td>Pedro Oliveira</td>
            <td>M</td>
            <td>22</td>
            <td>Estudante</td>  
        </tr>
            <tr>
                <td>Carla Dias</td>
                <td>F</td>
                <td>35</td>
                <td>Advogada</td>
            </tr>
            
    </table>
</body>
</html>
