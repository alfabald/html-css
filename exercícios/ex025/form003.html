<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>formulário meses, datas e horários</title>
</head>
<body>
   <h1> Teste de Formulário Meses, Datas e Horários</h1> 
   <form action="cadastro.php" method="post">
   <p>
    <label for="inome">Nome:</label>
    <input type="text" name="inome" id="inome" minlength="3" maxlength="15" size="12" placeholder="Digite seu nome" autocomplete="name" required>
   </p>
   <p>
    <label for="imedia">Mídia:</label>
    <input type="number" name="media" id="imedia" min="0" max="10" placeholder="0 a 10" step="0.1" value="5" required>
   </p>
   <p>
    <label for="imes">Periodo letivo:</label>
    <input type="month" name="mes" id="imes" value="2026-04">
   </p>
   <p>
    <label for="idia"> Dia da Prova</label>
    <input type="date" name="dia" id="idia" value="2024-12-25">
   </p>
   <p>
    <label for="ihora">Horário da Prova:</label>
    <input type="time" name="hora" id="ihora" value="14:30">
   </p>
   <p>
    <input type="submit" value="Enviar">
    <input type="reset" value="Limpar">
   </p>
    </form>
</body>
</html>
